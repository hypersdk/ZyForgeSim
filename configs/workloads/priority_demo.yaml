jobs:
  # Occupies the cluster's only GPU first, so job-low and job-high both
  # arrive while it's still running and are waiting together once it frees
  # the GPU — that's the moment scheduler policy (fifo vs priority) decides
  # who goes next.
  - id: job-filler
    name: filler
    arrival_time: 0
    runtime: 10
    gpu_count: 1
    priority: 0

  - id: job-low
    name: low-priority
    arrival_time: 1
    runtime: 50
    gpu_count: 1
    priority: 10

  - id: job-high
    name: high-priority
    arrival_time: 2
    runtime: 30
    gpu_count: 1
    priority: 90
